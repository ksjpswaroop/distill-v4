name: distill-v4
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core ML
  - python=3.11
  - pip=24.0
  
  # PyTorch + CUDA
  - pytorch::pytorch=2.3.1
  - pytorch::torchvision=0.18.1
  - pytorch::torchaudio=2.3.1
  - nvidia::cuda-toolkit=12.1
  - nvidia::cudnn=8.9.7
  
  # Distributed training
  - nvidia::nccl=2.20
  
  # Data processing
  - numpy=1.26.4
  - scipy=1.13.1
  - pandas=2.2.2
  - pyarrow=16.1.0
  - fastparquet=2024.5.0
  
  # ML frameworks
  - scikit-learn=1.5.0
  - transformers=4.42.0
  - peft=0.12.0
  - trl=0.9.6
  - accelerate=0.32.0
  - deepspeed=0.14.0
  
  # Model loading
  - huggingface-hub=0.23.4
  - safetensors=0.4.4
  
  # Code execution / verification
  - jq=1.7
  
  # Logging / monitoring
  - wandb=0.17.2
  - tensorboard=2.16.2
  
  # Utilities
  - tqdm=4.66.4
  - pyyaml=6.0.1
  - omegaconf=2.3.0
  - docker=6.1.3
  
  # Code / linting
  - black=24.4.2
  - ruff=0.5.0
  - mypy=1.10.0
  
  # Jupyter
  - ipython=8.26.0
  - jupyterlab=4.2.1
  
  # HTTP / APIs
  - requests=2.32.3
  - aiohttp=3.9.5
  
  # Vector search
  - faiss-cpu=1.8.0
  - faiss-gpu=1.8.0
  
  # Code evaluation
  - tree-sitter=0.22.2
  - tree-sitter-python=0.23.1
  
  # Formal verification (lightweight)
  - z3-solver=4.13.0
  
  # Pip-only packages (no conda equivalent)
  - pip:
    - bitsandbytes=0.43.3
    - flash-attn==2.6.3
    - einops=0.8.0
    - sentencepiece=0.2.0
    - tiktoken=0.7.0
    - protobuf=4.25.3
    - sympy=1.13.1
    - litellm=1.44.0